<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, sans-serif" font-size="12">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" fill="#333" font-weight="bold">Kitchen Setup - Dual Arm Configuration</text>
  
  <!-- Table/Workspace -->
  <rect x="200" y="250" width="400" height="250" rx="10" fill="#e0e0e0" stroke="#666" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">Working Area</text>
  
  <!-- Objects in workspace -->
  <!-- Cups -->
  <ellipse cx="300" cy="310" rx="20" ry="16" fill="#4fc3f7" stroke="#0288d1" stroke-width="2"/>
  <text x="300" y="314" text-anchor="middle" font-size="9" fill="#fff">Cup</text>
  
  <ellipse cx="360" cy="350" rx="20" ry="16" fill="#4fc3f7" stroke="#0288d1" stroke-width="2"/>
  <text x="360" y="354" text-anchor="middle" font-size="9" fill="#fff">Cup</text>
  
  <!-- Forks -->
  <rect x="420" y="300" width="35" height="12" rx="3" fill="#81c784" stroke="#388e3c" stroke-width="2"/>
  <text x="437" y="310" text-anchor="middle" font-size="8" fill="#fff">Fork</text>
  
  <rect x="450" y="340" width="35" height="12" rx="3" fill="#81c784" stroke="#388e3c" stroke-width="2"/>
  <text x="467" y="350" text-anchor="middle" font-size="8" fill="#fff">Fork</text>
  
  <!-- Spoons -->
  <ellipse cx="520" cy="310" rx="16" ry="10" fill="#ffb74d" stroke="#f57c00" stroke-width="2"/>
  <text x="520" y="314" text-anchor="middle" font-size="8" fill="#fff">Spoon</text>
  
  <ellipse cx="550" cy="350" rx="16" ry="10" fill="#ffb74d" stroke="#f57c00" stroke-width="2"/>
  <text x="550" y="354" text-anchor="middle" font-size="8" fill="#fff">Spoon</text>
  
  <!-- Trays -->
  <rect x="230" y="440" width="100" height="40" rx="5" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
  <text x="280" y="465" text-anchor="middle" font-size="10" fill="#333">Cup Tray</text>
  
  <rect x="350" y="440" width="100" height="40" rx="5" fill="#a5d6a7" stroke="#2e7d32" stroke-width="2"/>
  <text x="400" y="465" text-anchor="middle" font-size="10" fill="#333">Fork Tray</text>
  
  <rect x="470" y="440" width="100" height="40" rx="5" fill="#ffcc80" stroke="#e65100" stroke-width="2"/>
  <text x="520" y="465" text-anchor="middle" font-size="10" fill="#333">Spoon Tray</text>
  
  <!-- Robot Arm 1 (Left) -->
  <g>
    <!-- Base -->
    <rect x="120" y="400" width="60" height="50" rx="5" fill="#78909c" stroke="#455a64" stroke-width="2"/>
    <text x="150" y="430" text-anchor="middle" font-size="10" fill="#fff">Arm 1</text>
    
    <!-- Joint 1 -->
    <circle cx="150" cy="390" r="12" fill="#546e7a" stroke="#37474f" stroke-width="2"/>
    
    <!-- Link 1 -->
    <line x1="150" y1="390" x2="180" y2="320" stroke="#546e7a" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Joint 2 -->
    <circle cx="180" cy="320" r="10" fill="#546e7a" stroke="#37474f" stroke-width="2"/>
    
    <!-- Link 2 -->
    <line x1="180" y1="320" x2="230" y2="280" stroke="#546e7a" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Joint 3 (Wrist) -->
    <circle cx="230" cy="280" r="8" fill="#546e7a" stroke="#37474f" stroke-width="2"/>
    
    <!-- Gripper -->
    <rect x="230" y="270" width="30" height="20" rx="3" fill="#455a64" stroke="#263238" stroke-width="2"/>
    <line x1="260" y1="275" x2="275" y2="270" stroke="#455a64" stroke-width="4" stroke-linecap="round"/>
    <line x1="260" y1="285" x2="275" y2="290" stroke="#455a64" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Camera on Gripper -->
    <rect x="265" y="265" width="15" height="12" rx="2" fill="#5c6bc0" stroke="#283593" stroke-width="1"/>
    <text x="272" y="274" text-anchor="middle" font-size="6" fill="#fff">📷</text>
  </g>
  
  <!-- Robot Arm 2 (Right) -->
  <g>
    <!-- Base -->
    <rect x="620" y="400" width="60" height="50" rx="5" fill="#78909c" stroke="#455a64" stroke-width="2"/>
    <text x="650" y="430" text-anchor="middle" font-size="10" fill="#fff">Arm 2</text>
    
    <!-- Joint 1 -->
    <circle cx="650" cy="390" r="12" fill="#546e7a" stroke="#37474f" stroke-width="2"/>
    
    <!-- Link 1 -->
    <line x1="650" y1="390" x2="620" y2="320" stroke="#546e7a" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Joint 2 -->
    <circle cx="620" cy="320" r="10" fill="#546e7a" stroke="#37474f" stroke-width="2"/>
    
    <!-- Link 2 -->
    <line x1="620" y1="320" x2="570" y2="280" stroke="#546e7a" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Joint 3 (Wrist) -->
    <circle cx="570" cy="280" r="8" fill="#546e7a" stroke="#37474f" stroke-width="2"/>
    
    <!-- Gripper -->
    <rect x="540" y="270" width="30" height="20" rx="3" fill="#455a64" stroke="#263238" stroke-width="2"/>
    <line x1="540" y1="275" x2="525" y2="270" stroke="#455a64" stroke-width="4" stroke-linecap="round"/>
    <line x1="540" y1="285" x2="525" y2="290" stroke="#455a64" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Camera on Gripper -->
    <rect x="520" y="265" width="15" height="12" rx="2" fill="#5c6bc0" stroke="#283593" stroke-width="1"/>
    <text x="527" y="274" text-anchor="middle" font-size="6" fill="#fff">📷</text>
  </g>
  
  <!-- Camera 1 (Top View) -->
  <g>
    <rect x="370" y="60" width="60" height="40" rx="5" fill="#5c6bc0" stroke="#283593" stroke-width="2"/>
    <text x="400" y="78" text-anchor="middle" font-size="10" fill="#fff">📷 Top</text>
    <text x="400" y="90" text-anchor="middle" font-size="8" fill="#fff">Camera</text>
    <!-- Camera view cone -->
    <polygon points="400,100 250,250 550,250" fill="rgba(92,107,192,0.1)" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Camera 2 (Side View) -->
  <g>
    <rect x="100" y="200" width="55" height="35" rx="5" fill="#5c6bc0" stroke="#283593" stroke-width="2"/>
    <text x="127" y="215" text-anchor="middle" font-size="9" fill="#fff">📷 Side</text>
    <text x="127" y="227" text-anchor="middle" font-size="8" fill="#fff">Camera</text>
    <!-- Camera view cone -->
    <polygon points="155,217 250,250 250,400" fill="rgba(92,107,192,0.1)" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Legend -->
  <g>
    <rect x="620" y="60" width="160" height="180" rx="5" fill="#fff" stroke="#666" stroke-width="1"/>
    <text x="700" y="80" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Legend</text>
    
    <ellipse cx="640" cy="105" rx="12" ry="8" fill="#4fc3f7" stroke="#0288d1" stroke-width="1"/>
    <text x="665" y="109" font-size="10" fill="#333">Cups</text>
    
    <rect x="628" y="125" width="24" height="10" rx="3" fill="#81c784" stroke="#388e3c" stroke-width="1"/>
    <text x="665" y="135" font-size="10" fill="#333">Forks</text>
    
    <ellipse cx="640" cy="160" rx="10" ry="6" fill="#ffb74d" stroke="#f57c00" stroke-width="1"/>
    <text x="665" y="164" font-size="10" fill="#333">Spoons</text>
    
    <circle cx="640" cy="190" r="8" fill="#546e7a" stroke="#37474f" stroke-width="1"/>
    <text x="665" y="194" font-size="10" fill="#333">Robot Joints</text>
    
    <rect x="628" y="205" width="24" height="12" rx="2" fill="#455a64" stroke="#263238" stroke-width="1"/>
    <text x="665" y="215" font-size="10" fill="#333">Grippers</text>
    
    <rect x="628" y="225" width="12" height="10" rx="2" fill="#5c6bc0" stroke="#283593" stroke-width="1"/>
    <text x="665" y="234" font-size="10" fill="#333">Cameras</text>
  </g>
</svg>